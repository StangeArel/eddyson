<section class="partner-process-section" aria-labelledby="partner-process-title">
  <div class="partner-process-section__frame">
    <div class="partner-process-section__ribbons" aria-hidden="true">
      <svg
        class="partner-process-section__ribbon-svg partner-process-section__ribbon-svg--red"
        viewBox="0 0 1243 266"
        preserveAspectRatio="none"
        focusable="false"
      >
        <path
          class="partner-process-section__ribbon partner-process-section__ribbon--red"
          d="M1321.5 254.5C1208 254.5 380.5 11 -13.5 11"
        />
      </svg>

      <svg
        class="partner-process-section__ribbon-svg partner-process-section__ribbon-svg--violet"
        viewBox="0 0 1243 165"
        preserveAspectRatio="none"
        focusable="false"
      >
        <path
          class="partner-process-section__ribbon partner-process-section__ribbon--violet"
          d="M-20 11C93.4997 11 1189.5 154 1320.5 154"
        />
      </svg>

      <svg
        class="partner-process-section__ribbon-svg partner-process-section__ribbon-svg--mint"
        viewBox="0 0 1243 333"
        preserveAspectRatio="none"
        focusable="false"
      >
        <path
          class="partner-process-section__ribbon partner-process-section__ribbon--mint"
          d="M-20 321.5C307 321.5 859.5 11 1327.5 11"
        />
      </svg>
    </div>

    <header class="partner-process-section__intro">
      <p class="partner-process-section__eyebrow">Partner program</p>
      <h2 id="partner-process-title" class="partner-process-section__title">
        Efficient processes right from the start
      </h2>
      <p class="partner-process-section__text">
        Choosing eddyson means choosing a partnership built on trust, quality, and strategic
        foresight. Our 3-phase program lays the foundation for long-term success.
      </p>
    </header>

    <div class="partner-process-section__steps" aria-label="Partner program phases">
      @for (step of steps; track step.title) {
        <app-process-step-card
          [imageSrc]="step.imageSrc"
          [title]="step.title"
          [description]="step.description"
        />
      }
    </div>
  </div>
</section>
