<section
  class="expertise-section"
  [attr.aria-labelledby]="content() ? 'expertise-title' : null"
  [attr.aria-label]="content() ? null : 'Expertise section loading'"
  [attr.aria-busy]="content() ? null : 'true'"
>
  <div class="expertise-section__copy">
    @if (content(); as expertiseContent) {
      <h2 id="expertise-title" class="expertise-section__title">{{ expertiseContent.title }}</h2>
      <p class="expertise-section__text">{{ expertiseContent.text }}</p>
    } @else {
      <span
        class="app-skeleton expertise-section__title-skeleton"
        style="--skeleton-height: 50px"
      ></span>
      <span class="app-skeleton" style="--skeleton-width: 100%; --skeleton-height: 40px"></span>
      <span class="app-skeleton" style="--skeleton-width: 92%; --skeleton-height: 40px"></span>
      <span class="app-skeleton" style="--skeleton-width: 72%; --skeleton-height: 40px"></span>
    }
  </div>
</section>
