<section
  id="partner-benefits"
  class="benefits-section"
  [attr.aria-label]="content()?.ariaLabel || 'Benefits section loading'"
  [attr.aria-busy]="content() ? null : 'true'"
>
  <div class="benefits-section__grid">
    @if (content(); as benefitsContent) {
      @for (card of benefitsContent.cards; track card.title) {
        <article [class]="'benefit-card benefit-card--' + card.styleKey">
          <img class="benefit-card__media" [src]="card.image.src" [alt]="card.image.alt" />
          <div class="benefit-card__content">
            <h3 class="benefit-card__title">{{ card.title }}</h3>
            <p class="benefit-card__text">{{ card.description }}</p>
          </div>
        </article>
      }
    } @else {
      @for (card of [1, 2, 3, 4, 5, 6]; track card) {
        <article class="benefit-card benefit-card--skeleton" aria-hidden="true">
          <span
            class="app-skeleton"
            style="--skeleton-width: 48%; --skeleton-height: 28px; --skeleton-color: #ffffff47"
          ></span>
          <span
            class="app-skeleton"
            style="--skeleton-width: 92%; --skeleton-height: 22px; --skeleton-color: #ffffff2e"
          ></span>
          <span
            class="app-skeleton"
            style="--skeleton-width: 78%; --skeleton-height: 22px; --skeleton-color: #ffffff2e"
          ></span>
        </article>
      }
    }
  </div>
</section>
