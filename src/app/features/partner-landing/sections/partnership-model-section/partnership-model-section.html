<section
  class="partnership-model-section"
  [attr.aria-labelledby]="content() ? 'partnership-model-title' : null"
  [attr.aria-label]="content() ? null : 'Partnership model section loading'"
  [attr.aria-busy]="content() ? null : 'true'"
>
  <span class="partnership-model-section__rule" aria-hidden="true"></span>
  @if (content(); as partnershipContent) {
    <h2 id="partnership-model-title" class="partnership-model-section__title">
      {{ partnershipContent.question }}
      <a class="partnership-model-section__link" [attr.href]="partnershipContent.linkUrl || null">
        <span class="partnership-model-section__link-label">
          {{ partnershipContent.linkLabel }}
        </span>
        {{ partnershipContent.linkSuffix }}
      </a>
    </h2>
  } @else {
    <span
      class="app-skeleton partnership-model-section__title-skeleton"
      style="--skeleton-width: min(100%, 620px); --skeleton-height: 94px"
    ></span>
  }
  <span class="partnership-model-section__rule" aria-hidden="true"></span>
</section>
