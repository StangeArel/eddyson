@if (contentView(); as formContent) {
  <form
    class="partner-contact-form"
    [formGroup]="partnerForm"
    [attr.aria-label]="formAriaLabel()"
    novalidate
    (ngSubmit)="onSubmit()"
  >
    @for (field of fieldRows(); track field.controlName) {
      <label
        class="partner-contact-form__field"
        [class.partner-contact-form__field--message]="field.type === 'textarea'"
        [class.partner-contact-form__field--phone]="field.type === 'tel'"
        [class.partner-contact-form__field--invalid]="hasError(field.controlName)"
      >
        <span class="partner-contact-form__label">
          {{ field.label }}
          @if (field.required) {
            <span class="partner-contact-form__required-dot" aria-hidden="true"></span>
            <span class="partner-contact-form__sr-only">{{ field.requiredLabel }}</span>
          }
        </span>

        @switch (field.type) {
          @case ('tel') {
            <span class="partner-contact-form__phone-control">
              <select
                class="partner-contact-form__country-select"
                name="phone-country"
                formControlName="phoneCountry"
                [attr.aria-label]="
                  field.label +
                  ', ' +
                  selectedPhoneCountry().name +
                  ' ' +
                  selectedPhoneCountry().dialCode
                "
                (change)="onPhoneCountryChange()"
              >
                @for (country of phoneCountries; track country.iso) {
                  <option [value]="country.iso">{{ country.flag }}</option>
                }
              </select>
              <input
                type="tel"
                name="phone"
                [placeholder]="phonePlaceholder()"
                formControlName="phone"
                [attr.aria-required]="field.required ? 'true' : null"
                [attr.aria-invalid]="hasError(field.controlName)"
                [attr.aria-describedby]="
                  fieldErrorMessage(field) ? fieldErrorId(field.controlName) : null
                "
                (input)="onPhoneInput()"
              />
            </span>
          }
          @case ('select') {
            <select
              [name]="field.controlName"
              [formControlName]="field.controlName"
              [attr.aria-required]="field.required ? 'true' : null"
              [attr.aria-invalid]="hasError(field.controlName)"
              [attr.aria-describedby]="
                fieldErrorMessage(field) ? fieldErrorId(field.controlName) : null
              "
            >
              <option value="">{{ field.placeholder }}</option>
              @for (option of field.options; track option.value) {
                <option [value]="option.value">{{ option.label }}</option>
              }
            </select>
          }
          @case ('textarea') {
            <textarea
              #messageTextarea
              [name]="field.controlName"
              rows="2"
              [placeholder]="field.placeholder"
              [formControlName]="field.controlName"
              [attr.aria-describedby]="
                fieldErrorMessage(field) ? fieldErrorId(field.controlName) : null
              "
              (input)="resizeMessageTextarea($event)"
            ></textarea>
          }
          @default {
            <input
              [type]="field.type"
              [name]="field.controlName"
              [placeholder]="field.placeholder"
              [formControlName]="field.controlName"
              [attr.aria-required]="field.required ? 'true' : null"
              [attr.aria-invalid]="hasError(field.controlName)"
              [attr.aria-describedby]="
                fieldErrorMessage(field) ? fieldErrorId(field.controlName) : null
              "
            />
          }
        }

        @if (fieldErrorMessage(field); as errorMessage) {
          <span
            class="partner-contact-form__error"
            [id]="fieldErrorId(field.controlName)"
            aria-live="polite"
          >
            {{ errorMessage }}
          </span>
        }
      </label>
    }

    <label
      class="partner-contact-form__privacy"
      [class.partner-contact-form__privacy--invalid]="hasError('privacy')"
    >
      <input
        type="checkbox"
        name="privacy"
        formControlName="privacy"
        [attr.aria-invalid]="hasError('privacy')"
        [attr.aria-describedby]="privacyErrorMessage() ? 'privacy-error' : null"
      />
      @if (privacyUrl()) {
        <a class="partner-contact-form__privacy-link" [href]="privacyUrl()">
          {{ privacyText() }}
        </a>
      } @else {
        <span>{{ privacyText() }}</span>
      }
      @if (privacyErrorMessage(); as privacyError) {
        <span class="partner-contact-form__privacy-error" id="privacy-error" aria-live="polite">
          {{ privacyError }}
        </span>
      }
    </label>

    <button class="partner-contact-form__submit" type="submit">{{ submitLabel() }}</button>
  </form>
}
